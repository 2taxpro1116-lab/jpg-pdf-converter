<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to JPG 변환기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            color: #1a1a2e;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .drop-zone {
            border: 2px dashed #bbb;
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
            margin-bottom: 24px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #e74c3c;
            background: #fdf2f2;
        }
        .drop-zone-icon { font-size: 48px; margin-bottom: 12px; }
        .drop-zone-text { font-size: 1.1rem; color: #555; margin-bottom: 8px; }
        .drop-zone-hint { font-size: 0.85rem; color: #999; }
        .file-input { display: none; }

        .file-info {
            background: #fff;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: none;
            align-items: center;
            justify-content: space-between;
        }
        .file-info.show { display: flex; }
        .file-info .name {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .file-info .detail {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }
        .file-info .remove-file {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #999;
            cursor: pointer;
            padding: 4px 8px;
        }
        .file-info .remove-file:hover { color: #e74c3c; }

        .options {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: none;
        }
        .options.show { display: block; }
        .options h3 { margin-bottom: 16px; font-size: 1rem; }
        .option-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .option-row label {
            font-size: 0.9rem;
            color: #444;
            min-width: 100px;
        }
        .option-row select, .option-row input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            background: #f8f9fa;
        }
        .page-range-inputs {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-range-inputs input[type="number"] { width: 70px; }
        .page-range-inputs span { color: #888; }

        .btn-convert {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: #e74c3c;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-convert:hover { background: #c0392b; }
        .btn-convert:disabled { background: #ccc; cursor: not-allowed; }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 16px;
            overflow: hidden;
            display: none;
        }
        .progress-bar.show { display: block; }
        .progress-bar .fill {
            height: 100%;
            background: #e74c3c;
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }

        .status {
            text-align: center;
            margin-top: 12px;
            font-size: 0.9rem;
            color: #666;
        }
        .status.success { color: #2ecc71; font-weight: 600; }

        .results {
            margin-top: 32px;
            display: none;
        }
        .results.show { display: block; }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .results-header h3 { font-size: 1.1rem; }
        .btn-download-all {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: #2ecc71;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-download-all:hover { background: #27ae60; }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .result-item {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .result-item img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #fafafa;
            display: block;
        }
        .result-item .info {
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-item .page-label {
            font-size: 0.85rem;
            color: #555;
            font-weight: 600;
        }
        .result-item .btn-dl {
            padding: 5px 12px;
            font-size: 0.8rem;
            border: none;
            border-radius: 6px;
            background: #4361ee;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }
        .result-item .btn-dl:hover { background: #3a56d4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PDF to JPG 변환기</h1>
        <p class="subtitle">PDF 파일을 업로드하면 각 페이지를 JPG 이미지로 변환합니다</p>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📄</div>
            <div class="drop-zone-text">PDF 파일을 여기에 드래그하거나 클릭하여 선택</div>
            <div class="drop-zone-hint">PDF 파일 1개 선택</div>
        </div>
        <input type="file" class="file-input" id="fileInput" accept="application/pdf">

        <div class="file-info" id="fileInfo">
            <div>
                <div class="name" id="fileName"></div>
                <div class="detail" id="fileDetail"></div>
            </div>
            <button class="remove-file" id="removeFile">&times;</button>
        </div>

        <div class="options" id="options">
            <h3>설정</h3>
            <div class="option-row">
                <label>이미지 품질</label>
                <select id="scale">
                    <option value="1">보통 (1x)</option>
                    <option value="2" selected>높음 (2x)</option>
                    <option value="3">매우 높음 (3x)</option>
                </select>
            </div>
            <div class="option-row">
                <label>출력 형식</label>
                <select id="format">
                    <option value="jpeg">JPG</option>
                    <option value="png">PNG</option>
                </select>
            </div>
            <div class="option-row">
                <label>JPG 품질</label>
                <select id="jpgQuality">
                    <option value="1.0">최고 (100%)</option>
                    <option value="0.92" selected>높음 (92%)</option>
                    <option value="0.8">중간 (80%)</option>
                    <option value="0.6">낮음 (60%)</option>
                </select>
            </div>
            <div class="option-row">
                <label>페이지 범위</label>
                <select id="rangeType">
                    <option value="all">전체 페이지</option>
                    <option value="custom">직접 지정</option>
                </select>
            </div>
            <div class="option-row" id="customRange" style="display:none;">
                <label></label>
                <div class="page-range-inputs">
                    <input type="number" id="pageFrom" min="1" value="1" placeholder="시작">
                    <span>~</span>
                    <input type="number" id="pageTo" min="1" value="1" placeholder="끝">
                    <span id="totalPagesHint" style="font-size:0.8rem;color:#999;"></span>
                </div>
            </div>
        </div>

        <button class="btn-convert" id="convertBtn" disabled>JPG로 변환하기</button>
        <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
        <div class="status" id="status"></div>

        <div class="results" id="results">
            <div class="results-header">
                <h3>변환 결과</h3>
                <button class="btn-download-all" id="downloadAllBtn">전체 다운로드 (ZIP)</button>
            </div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileDetail = document.getElementById('fileDetail');
        const removeFile = document.getElementById('removeFile');
        const optionsEl = document.getElementById('options');
        const convertBtn = document.getElementById('convertBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const statusEl = document.getElementById('status');
        const results = document.getElementById('results');
        const resultsGrid = document.getElementById('resultsGrid');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const rangeType = document.getElementById('rangeType');
        const customRange = document.getElementById('customRange');

        let pdfFile = null;
        let pdfDoc = null;
        let imageBlobs = [];

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const f = e.dataTransfer.files[0];
            if (f && f.type === 'application/pdf') loadPDF(f);
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) loadPDF(fileInput.files[0]);
            fileInput.value = '';
        });
        removeFile.addEventListener('click', resetState);
        rangeType.addEventListener('change', () => {
            customRange.style.display = rangeType.value === 'custom' ? 'flex' : 'none';
        });

        async function loadPDF(file) {
            pdfFile = file;
            const arrayBuffer = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

            fileName.textContent = file.name;
            fileDetail.textContent = `${pdfDoc.numPages}페이지 · ${(file.size / 1024 / 1024).toFixed(2)} MB`;
            fileInfo.classList.add('show');
            optionsEl.classList.add('show');
            convertBtn.disabled = false;
            dropZone.style.display = 'none';
            results.classList.remove('show');

            document.getElementById('pageTo').value = pdfDoc.numPages;
            document.getElementById('pageTo').max = pdfDoc.numPages;
            document.getElementById('pageFrom').max = pdfDoc.numPages;
            document.getElementById('totalPagesHint').textContent = `(총 ${pdfDoc.numPages}페이지)`;
        }

        function resetState() {
            pdfFile = null;
            pdfDoc = null;
            imageBlobs = [];
            fileInfo.classList.remove('show');
            optionsEl.classList.remove('show');
            convertBtn.disabled = true;
            dropZone.style.display = '';
            results.classList.remove('show');
            progressBar.classList.remove('show');
            statusEl.textContent = '';
        }

        convertBtn.addEventListener('click', async () => {
            if (!pdfDoc) return;

            const scale = parseFloat(document.getElementById('scale').value);
            const format = document.getElementById('format').value;
            const jpgQuality = parseFloat(document.getElementById('jpgQuality').value);
            let fromPage = 1;
            let toPage = pdfDoc.numPages;

            if (rangeType.value === 'custom') {
                fromPage = Math.max(1, parseInt(document.getElementById('pageFrom').value) || 1);
                toPage = Math.min(pdfDoc.numPages, parseInt(document.getElementById('pageTo').value) || pdfDoc.numPages);
            }

            convertBtn.disabled = true;
            progressBar.classList.add('show');
            results.classList.remove('show');
            resultsGrid.innerHTML = '';
            imageBlobs = [];

            const totalPages = toPage - fromPage + 1;

            for (let i = fromPage; i <= toPage; i++) {
                statusEl.textContent = `변환 중... (${i - fromPage + 1}/${totalPages})`;
                statusEl.className = 'status';
                progressFill.style.width = `${((i - fromPage + 1) / totalPages) * 100}%`;

                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');

                if (format === 'jpeg') {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                await page.render({ canvasContext: ctx, viewport }).promise;

                const mimeType = format === 'png' ? 'image/png' : 'image/jpeg';
                const blob = await new Promise(resolve => canvas.toBlob(resolve, mimeType, jpgQuality));
                const url = URL.createObjectURL(blob);
                const ext = format === 'png' ? 'png' : 'jpg';
                const baseName = pdfFile.name.replace(/\.pdf$/i, '');

                imageBlobs.push({ blob, name: `${baseName}_page${i}.${ext}`, url });

                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <img src="${url}" alt="Page ${i}">
                    <div class="info">
                        <span class="page-label">페이지 ${i}</span>
                        <button class="btn-dl" data-index="${imageBlobs.length - 1}">다운로드</button>
                    </div>
                `;
                resultsGrid.appendChild(item);
            }

            statusEl.textContent = '변환 완료!';
            statusEl.className = 'status success';
            results.classList.add('show');
            convertBtn.disabled = false;
        });

        resultsGrid.addEventListener('click', e => {
            if (e.target.classList.contains('btn-dl')) {
                const idx = parseInt(e.target.dataset.index);
                downloadBlob(imageBlobs[idx]);
            }
        });

        function downloadBlob({ blob, name }) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            a.click();
        }

        downloadAllBtn.addEventListener('click', async () => {
            if (imageBlobs.length === 1) {
                downloadBlob(imageBlobs[0]);
                return;
            }

            downloadAllBtn.textContent = 'ZIP 생성 중...';
            downloadAllBtn.disabled = true;

            // Simple ZIP implementation (no external library needed)
            const zipParts = [];
            const centralDir = [];
            let offset = 0;

            for (const { blob, name } of imageBlobs) {
                const data = new Uint8Array(await blob.arrayBuffer());
                const nameBytes = new TextEncoder().encode(name);

                // Local file header
                const header = new Uint8Array(30 + nameBytes.length);
                const view = new DataView(header.buffer);
                view.setUint32(0, 0x04034b50, true); // signature
                view.setUint16(4, 20, true); // version needed
                view.setUint16(6, 0, true); // flags
                view.setUint16(8, 0, true); // compression (store)
                view.setUint16(10, 0, true); // mod time
                view.setUint16(12, 0, true); // mod date
                view.setUint32(14, crc32(data), true); // crc32
                view.setUint32(18, data.length, true); // compressed size
                view.setUint32(22, data.length, true); // uncompressed size
                view.setUint16(26, nameBytes.length, true); // name length
                view.setUint16(28, 0, true); // extra length
                header.set(nameBytes, 30);

                // Central directory entry
                const cdEntry = new Uint8Array(46 + nameBytes.length);
                const cdView = new DataView(cdEntry.buffer);
                cdView.setUint32(0, 0x02014b50, true);
                cdView.setUint16(4, 20, true);
                cdView.setUint16(6, 20, true);
                cdView.setUint16(8, 0, true);
                cdView.setUint16(10, 0, true);
                cdView.setUint16(12, 0, true);
                cdView.setUint16(14, 0, true);
                cdView.setUint32(16, crc32(data), true);
                cdView.setUint32(20, data.length, true);
                cdView.setUint32(24, data.length, true);
                cdView.setUint16(28, nameBytes.length, true);
                cdView.setUint16(30, 0, true);
                cdView.setUint16(32, 0, true);
                cdView.setUint16(34, 0, true);
                cdView.setUint16(36, 0, true);
                cdView.setUint32(38, 0, true);
                cdView.setUint32(42, offset, true);
                cdEntry.set(nameBytes, 46);
                centralDir.push(cdEntry);

                zipParts.push(header, data);
                offset += header.length + data.length;
            }

            const cdOffset = offset;
            let cdSize = 0;
            for (const cd of centralDir) {
                zipParts.push(cd);
                cdSize += cd.length;
            }

            // End of central directory
            const eocd = new Uint8Array(22);
            const eocdView = new DataView(eocd.buffer);
            eocdView.setUint32(0, 0x06054b50, true);
            eocdView.setUint16(4, 0, true);
            eocdView.setUint16(6, 0, true);
            eocdView.setUint16(8, imageBlobs.length, true);
            eocdView.setUint16(10, imageBlobs.length, true);
            eocdView.setUint32(12, cdSize, true);
            eocdView.setUint32(16, cdOffset, true);
            eocdView.setUint16(20, 0, true);
            zipParts.push(eocd);

            const zipBlob = new Blob(zipParts, { type: 'application/zip' });
            const baseName = pdfFile.name.replace(/\.pdf$/i, '');
            downloadBlob({ blob: zipBlob, name: `${baseName}_images.zip` });

            downloadAllBtn.textContent = '전체 다운로드 (ZIP)';
            downloadAllBtn.disabled = false;
        });

        // CRC32 table
        const crc32Table = new Uint32Array(256);
        for (let i = 0; i < 256; i++) {
            let c = i;
            for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
            crc32Table[i] = c;
        }
        function crc32(data) {
            let crc = 0xFFFFFFFF;
            for (let i = 0; i < data.length; i++) crc = crc32Table[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
            return (crc ^ 0xFFFFFFFF) >>> 0;
        }
    </script>
</body>
</html>
